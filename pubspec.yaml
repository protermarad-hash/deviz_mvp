name: devizpro_ultra
version: 1.1.0+15
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  path_provider: ^2.1.5
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.5
  cloud_functions: ^5.5.0
  firebase_storage: ^12.4.6
  firebase_messaging: ^15.2.5
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  uuid: ^4.5.1
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.5.3
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  open_filex: ^4.5.0
  share_plus: ^10.1.2
  flutter_local_notifications: ^19.2.1
  http: ^1.3.0
  archive: ^3.6.1
  excel: ^4.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon/proventaris_identity.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon/proventaris_identity.png"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/arial.ttf
    - assets/fonts/arialbd.ttf
    - assets/app_icon/
